<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Study Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>📚 Smart Study Planner</h2>

  <label>Subject</label>
  <input type="text" id="subject" placeholder="BDA">

  <label>Study Start Time</label>
  <input type="time" id="startTime">

  <label>Unit Name</label>
  <input type="text" id="unitName" placeholder="Introduction to Hadoop">

  <label>Total Time for Unit (hours)</label>
  <input type="number" id="unitHours" min="1">

  <label>Topics (one topic per line)</label>
  <textarea id="topics" rows="5"></textarea>

  <div class="buttons">
    <button class="add" onclick="addUnit()">Add Unit</button>
    <button class="gen" onclick="generateTimetable()">Generate Timetable</button>
    <button class="clear" onclick="clearAll()">Clear All</button>
  </div>

  <p id="message"></p>

  <div id="unitList"></div>
</div>

<div class="container">
  <h3 id="ttTitle"></h3>
  <div id="timetable"></div>
</div>

<script src="script.js"></script>
</body>
</html>
